function startFortune(){

homeScreen.classList.remove('active');
loadingScreen.classList.add('active');

setTimeout(()=>{

loadingScreen.classList.remove('active');
resultScreen.classList.add('active');

generateFortune();

},2200);

}

function generateFortune(){

infoGrid.classList.remove('show');

const finalScore=Math.floor(Math.random()*51)+50;

const selected=fortuneData.find(
item=>finalScore>=item.min&&finalScore<=item.max
);

mainMessage.innerHTML=
selected.titles[Math.floor(Math.random()*selected.titles.length)];

subMessage.innerHTML=
selected.subs[Math.floor(Math.random()*selected.subs.length)];

bonusMessage.innerHTML=
selected.bonus[Math.floor(Math.random()*selected.bonus.length)];

let current=50;

const interval=setInterval(()=>{

current+=Math.floor(Math.random()*3)+1;

if(current>=finalScore){

current=finalScore;

clearInterval(interval);

setTimeout(()=>{
infoGrid.classList.add('show');
},350);

}

scoreNumber.innerText=current;

const degree=current*3.6;

scoreCircle.style.background=
`conic-gradient(#5fc774 ${degree}deg,#e4f3e7 ${degree}deg)`;

},55);

}

function goHome(){

resultScreen.classList.remove('active');
homeScreen.classList.add('active');

alreadyText.style.display='block';

}

async function saveImage(){

const target=document.querySelector("#captureArea");

const canvas=await html2canvas(target,{
backgroundColor:null,
scale:2,
useCORS:true
});

const image=canvas.toDataURL("image/jpeg",1.0);

const link=document.createElement("a");

link.href=image;

link.download=`luck-today-${Date.now()}.jpg`;

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}
