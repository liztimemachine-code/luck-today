<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCK TODAY</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:linear-gradient(180deg,#eef8f0 0%,#dff2e4 100%);
min-height:100vh;
overflow-x:hidden;
color:#2f4634;
}

.app{
width:100%;
max-width:430px;
margin:0 auto;
min-height:100vh;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
}

.screen{
display:none;
width:100%;
animation:fadeUp .45s ease;
}

.screen.active{
display:block;
}

.card,.result-card{
background:rgba(255,255,255,.94);
border-radius:36px;
padding:48px 24px;
box-shadow:0 10px 30px rgba(84,125,94,.12);
width:100%;
min-height:88vh;
display:flex;
flex-direction:column;
justify-content:center;
}

.result-card{
min-height:88vh;
}

.center{
text-align:center;
}

.big-clover{
font-size:95px;
margin-bottom:24px;
animation:float 3s ease-in-out infinite;
}

.small-clover{
font-size:42px;
margin-bottom:12px;
}

.main-title{
font-size:42px;
font-weight:800;
letter-spacing:-1px;
color:#33553c;
}

.sub-text{
margin-top:14px;
font-size:17px;
line-height:1.6;
color:#68816e;
}

.main-btn,.save-btn{
width:100%;
height:60px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#7ddc8d,#59c56d);
color:white;
font-size:17px;
font-weight:700;
margin-top:30px;
cursor:pointer;
}

.retry-btn{
width:100%;
height:58px;
border-radius:20px;
margin-top:14px;
background:transparent;
border:2px solid #cfe8d4;
font-size:16px;
font-weight:700;
color:#48654f;
cursor:pointer;
}

.already-text{
margin-top:18px;
font-size:14px;
line-height:1.6;
color:#6f8b74;
}

.loader-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:70vh;
}

.loader{
width:96px;
height:96px;
border:8px solid #d9eedf;
border-top:8px solid #61c975;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loading-text{
margin-top:26px;
font-size:19px;
font-weight:700;
color:#4e6d55;
animation:blink 1s infinite;
}

.daily{
margin-top:5px;
font-size:13px;
letter-spacing:1px;
color:#7b927f;
}

.score-circle{
width:185px;
height:185px;
border-radius:50%;
margin:28px auto 14px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
background:conic-gradient(#5fc774 0%,#e4f3e7 0%);
transition:.3s;
}

.score-circle::before{
content:'';
position:absolute;
width:142px;
height:142px;
border-radius:50%;
background:white;
}

.score-inner{
position:relative;
z-index:2;
text-align:center;
}

.score-label{
font-size:13px;
color:#728a76;
}

.score-number{
font-size:52px;
font-weight:800;
color:#2d4e35;
}

.main-message{
text-align:center;
font-size:22px;
font-weight:800;
line-height:1.45;
min-height:70px;
color:#314e38;
margin-top:8px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
opacity:0;
transform:translateY(10px);
transition:.4s;
}

.info-grid.show{
opacity:1;
transform:translateY(0);
}

.info-box{
background:#eef8f0;
padding:16px;
border-radius:20px;
min-height:125px;
}

.info-title{
font-size:12px;
color:#718c77;
margin-bottom:8px;
}

.info-content{
font-size:13px;
font-weight:700;
line-height:1.55;
color:#3a5541;
}

.button-wrap{
margin-top:24px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes blink{
50%{
opacity:.4;
}
}

@keyframes float{
50%{
transform:translateY(-8px);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(16px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:380px){

.main-title{
font-size:35px;
}

.main-message{
font-size:20px;
}

.score-circle{
width:165px;
height:165px;
}

.score-circle::before{
width:126px;
height:126px;
}

.card,.result-card{
padding:42px 20px;
}

}

</style>
</head>

<body>

<div class="app">

<section class="screen active" id="homeScreen">

<div class="card center">

<div>

<div class="big-clover">🍀</div>

<div class="main-title">
LUCK TODAY
</div>

<div class="sub-text">
당신의 오늘 행운을 확인해보세요✨
</div>

<button class="main-btn" onclick="startFortune()">
행운 확인하기
</button>

<div class="already-text" id="alreadyText" style="display:none;">
*오늘은 이미 확인하셨네요!<br>
내일 또 만나요🌈
</div>

</div>

</div>

</section>

<section class="screen" id="loadingScreen">

<div class="loader-wrap">

<div class="loader"></div>

<div class="loading-text">
행운을 불러오는 중...
</div>

</div>

</section>

<section class="screen" id="resultScreen">

<div class="result-card">

<div id="captureArea">

<div class="center">

<div class="small-clover">🍀</div>

<div class="main-title" style="font-size:38px;">
LUCK TODAY
</div>

<div class="daily">
DAILY FORTUNE
</div>

</div>

<div class="score-circle" id="scoreCircle">

<div class="score-inner">

<div class="score-label">
행운 지수
</div>

<div class="score-number" id="scoreNumber">
50
</div>

</div>

</div>

<div class="main-message" id="mainMessage"></div>

<div class="info-grid" id="infoGrid">

<div class="info-box">

<div class="info-title">
💬 한줄 메시지
</div>

<div class="info-content" id="subMessage"></div>

</div>

<div class="info-box">

<div class="info-title">
🎁 보너스 문구
</div>

<div class="info-content" id="bonusMessage"></div>

</div>

</div>

</div>

<div class="button-wrap">

<button class="save-btn" onclick="saveImage()">
📥 결과 이미지 저장하기
</button>

<button class="retry-btn" onclick="goHome()">
🔄 다시 뽑기
</button>

</div>

</div>

</section>

</div>

<script>

const homeScreen=document.getElementById('homeScreen');
const loadingScreen=document.getElementById('loadingScreen');
const resultScreen=document.getElementById('resultScreen');

const scoreNumber=document.getElementById('scoreNumber');
const scoreCircle=document.getElementById('scoreCircle');

const mainMessage=document.getElementById('mainMessage');
const subMessage=document.getElementById('subMessage');
const bonusMessage=document.getElementById('bonusMessage');

const infoGrid=document.getElementById('infoGrid');
const alreadyText=document.getElementById('alreadyText');

const fortuneData=[

{
min:90,
max:100,

titles:[
"오늘은 기대해도 되는 날 🔥",
"운 제대로 터진 날 💥",
"오늘은 그냥 되는 날 🍀",
"운이 확실히 내 편인 하루 💚",
"오늘은 결과까지 이어지는 날 ✨"
],

subs:[
"지금이 타이밍임, 바로 가도 됨 🔥",
"고민할 필요 없음, 그냥 해 💥",
"이건 밀어붙이면 결과 나온다 ⚡",
"오늘은 실행이 답 🔥"
],

bonus:[
"지금 바로 하나 실행해보기 🚀",
"오늘은 도전해도 손해 없음 💥",
"오늘은 기회 잡아보기 🎯"
]

},

{
min:70,
max:89,

titles:[
"오늘은 꽤 괜찮은 하루 😆",
"운이 은근 따라주는 날 🍀",
"오늘은 기분 좋은 흐름 ✨"
],

subs:[
"오늘은 꽤 괜찮은 흐름 😆🍀",
"운이 슬쩍 도와주는 느낌 ✨",
"생각보다 잘 풀리는 날 👍"
],

bonus:[
"가볍게 하나 도전해보기 😉",
"오늘은 소소하게 즐기기 🍀",
"기분 좋은 거 하나 해보기 😊"
]

},

{
min:50,
max:69,

titles:[
"오늘은 편하게 가는 날 🙂",
"무난하게 지나가는 하루 🍀",
"오늘은 잔잔한 흐름 🌿"
],

subs:[
"오늘은 그냥 편하게 가는 날 🙂",
"무난하게 지나가기 좋은 하루 🍀",
"오늘은 잔잔하게 좋은 날 🌿"
],

bonus:[
"오늘은 무리하지 말기 🚫",
"천천히 진행하기 🐢",
"오늘은 안정적으로 가기 🔒"
]

}

];

function startFortune(){

homeScreen.classList.remove('active');
loadingScreen.classList.add('active');

setTimeout(()=>{

loadingScreen.classList.remove('active');
resultScreen.classList.add('active');

generateFortune();

},2200);

}

function generateFortune(){

infoGrid.classList.remove('show');

const finalScore=Math.floor(Math.random()*51)+50;

const selected=fortuneData.find(
item=>finalScore>=item.min&&finalScore<=item.max
);

mainMessage.innerHTML=
selected.titles[Math.floor(Math.random()*selected.titles.length)];

subMessage.innerHTML=
selected.subs[Math.floor(Math.random()*selected.subs.length)];

bonusMessage.innerHTML=
selected.bonus[Math.floor(Math.random()*selected.bonus.length)];

let current=50;

const interval=setInterval(()=>{

current+=Math.floor(Math.random()*4)+1;

if(current>=finalScore){

current=finalScore;

clearInterval(interval);

setTimeout(()=>{
infoGrid.classList.add('show');
},300);

}

scoreNumber.innerText=current;

const degree=current*3.6;

scoreCircle.style.background=
`conic-gradient(#5fc774 ${degree}deg,#e4f3e7 ${degree}deg)`;

},35);

}

function goHome(){

resultScreen.classList.remove('active');
homeScreen.classList.add('active');

alreadyText.style.display='block';

}

function saveImage(){

html2canvas(document.querySelector("#captureArea")).then(canvas=>{

const link=document.createElement("a");

link.download="luck-today.jpg";

link.href=canvas.toDataURL("image/jpeg",1.0);

link.click();

});

}

</script>

</body>
</html>
